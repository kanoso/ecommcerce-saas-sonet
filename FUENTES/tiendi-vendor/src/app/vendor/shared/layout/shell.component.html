@if (isMobile()) {
  <td-mobile-shell />
} @else {
  <div class="shell">
    <td-sidebar
      [userRole]="userRole()"
      [collapsed]="isTablet()"
      [notificationCount]="unreadCount()"
      (itemClick)="onNavItem($event)"
    />

    <div class="shell__main">
      <td-topbar
        [storeName]="storeName()"
        [userName]="userName()"
        [userEmail]="userEmail()"
        [userRole]="userRoleLabel()"
        [unreadNotifications]="unreadCount()"
        (menuToggle)="onMenuToggle()"
        (notificationClick)="onNotifications()"
        (profileClick)="onProfile()"
        (logoutClick)="onLogout()"
      />

      <main class="shell__content" id="main-content" tabindex="-1">
        <router-outlet />
      </main>
    </div>
  </div>
}

<!-- chat widget disabled: @tiendi/chat requires rebuild targeting Angular 21 -->

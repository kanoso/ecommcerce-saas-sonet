<div class="empty-state" role="status">
  <td-icon [name]="icon()" size="xl" ariaLabel="" />
  <h3 class="empty-state__title">{{ title() }}</h3>
  <p class="empty-state__message">{{ message() }}</p>
  @if (actionLabel()) {
    <td-button
      [label]="actionLabel()!"
      variant="primary"
      (clicked)="action.emit()"
    />
  }
</div>
